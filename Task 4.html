<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4</title>
</head>
<body>
    <h2>Fill your information</h2>
    <fieldset>
        <legend>Personal Information</legend>
        <form action="">
            <label> First Name:</label>
            <input type="text" name="name">
            <label> Last Name:</label>
            <input type="text" name="name"><br><br>

            <label >Age:</label><br>
            <input type="number" name="age"><br><br>

            <label>Email:</label><br>
            <input type="email"  name="email"><br><br>

            <label>Phone Number:</label><br>
            <input type="tel" name="phone"><br><br>

            <label>Your Gender</label>
            <input type="radio" name="gender" value="male" id="male">
            <label for="male">Male</label>
            <input type="radio" name="gender" value="female" id="female">
            <label for="female">Female</label><br><br>

            <label>Your Favorite Subjects</label>
            <input type="checkbox" name="subjects" value="C++" id="C++">
            <label for="C++">C++</label>
            <input type="checkbox" name="subjects" value="Java" id="Java">
            <label for="Java">Java</label>
            <input type="checkbox" name="subjects" value="Python" id="Python">
            <label for="Python">Python</label>
            <input type="checkbox" name="subjects" value="C#" id="C#">
            <label for="C#">C#</label>
            <input type="checkbox" name="subjects" value="PHP" id="PHP">
            <label for="PHP">PHP</label>
            <br><br>

            <label>Your Country</label>
            <select name="country">
                <option value="Amman">Amman</option>
                <option value="Zarqa">Zarqa</option>
                <option value="Irbid">Irbid</option>
            </select><br><br>

            <label>Upload Your Photo</label>
            <input type="file" name="photo"><br><br>

            <label>Write about yourself</label><br>
            <textarea name="message" rows="4" cols="50" placeholder="Write short description about yourself..."></textarea><br><br>

            <input type="submit" value="Submit">
        </form>
    </fieldset>
<br><br>


     <form autocomplete="on">

        <table>
            
   <tr>

    <td><label>Name:</label></td>
    <td><input type="text" name="name" placeholder="Enter your name" required><br></td>
    </tr>
    <tr>
    <td><label>Address:</label></td>
    <td><input type="text" name="adress" placeholder="Enter your address" required><br></td>
    </tr>
    <tr>
    <td><label>City:</label></td>
    <td><input type="text" name="city" placeholder="Enter your city" required><br></td>
    </tr>
    <tr>
    <td><label>State:</label></td>
    <td><input type="text" name="state" placeholder="Enter your state" required><br></td>
    </tr>
    <tr>
    <td><label>Zip Code:</label></td>
    <td><input type="number" name="zip" placeholder="Enter your zip code" required><br></td>
    </tr>
    <tr>
    <td><label>Magazine:</label></td>
    <td><select name="Magazine" >
        <option value="Tech Today" selected>Tech Today</option>
        <option value="Science Weekly">Science Weekly</option>
        <option value="Health & Fitness">Health & Fitness</option>
    </select><br></td>
    </tr>
    <tr>
    <td><label >Subscribtion</label></td>
    <td>
    <input type="radio" name="subscribe" value="1" id="1y"> 
                <label for="1y">1 year</label>
    <input type="radio" name="subscribe" value="2" id="2y">
        <label for="2y">2 years</label>
        </td></tr>         </table>

    <button type="submit" value="Submit"> Submit </button>


        </form>
</body>
</html>
